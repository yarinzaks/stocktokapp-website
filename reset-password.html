<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Reset password — StockTok</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --card: #0d0d0d;
        --border: rgba(255, 255, 255, 0.08);
        --text: #fff;
        --muted: rgba(255, 255, 255, 0.6);
        --brand-1: #00e676;
        --brand-2: #00b85c;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px 28px;
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 36px;
        background: rgba(0, 230, 118, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        font-size: 36px;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin: 0 0 12px;
      }
      p {
        font-size: 16px;
        line-height: 1.4;
        color: var(--muted);
        margin: 0 0 24px;
      }
      .btn {
        display: inline-block;
        width: 100%;
        height: 48px;
        line-height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
        color: #000;
        font-weight: 700;
        font-size: 16px;
        text-decoration: none;
        text-align: center;
        border: 0;
        cursor: pointer;
        margin-bottom: 16px;
      }
      .btn[hidden] { display: none; }
      .btn-secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .stores {
        display: flex;
        gap: 12px;
        margin-top: 16px;
      }
      .stores a {
        flex: 1;
        height: 44px;
        line-height: 44px;
        border-radius: 10px;
        border: 1px solid var(--border);
        color: var(--text);
        text-decoration: none;
        font-size: 14px;
      }
      .stores[hidden] { display: none; }
      .meta {
        margin-top: 24px;
        font-size: 12px;
        color: var(--muted);
      }
      [dir="rtl"] body, body[dir="rtl"] { direction: rtl; }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="icon" aria-hidden="true">🔑</div>
      <h1 id="title">Reset your password</h1>
      <p id="message">Open the StockTok app to finish setting your new password.</p>
      <button id="openAppBtn" class="btn" type="button">Open StockTok</button>
      <div id="storeLinks" class="stores" hidden>
        <a href="https://apps.apple.com/app/stocktok" rel="noopener">App Store</a>
        <a href="https://play.google.com/store/apps/details?id=com.stocktok.app" rel="noopener">Google Play</a>
      </div>
      <p class="meta" id="footer">For security, this link expires after one hour.</p>
    </main>

    <script>
      (function () {
        // Preserve the recovery tokens that GoTrue put in the URL fragment.
        // Format: #access_token=...&refresh_token=...&type=recovery&expires_in=...
        var hash = window.location.hash || '';
        var deepLink = 'stocktok://reset-password' + hash;

        // Hebrew users get the page in RTL/Hebrew. Match the app's i18n
        // policy. Other locales fall back to English.
        var lang = (navigator.language || 'en').toLowerCase();
        if (lang.indexOf('he') === 0) {
          document.documentElement.lang = 'he';
          document.documentElement.dir = 'rtl';
          document.title = 'איפוס סיסמה — StockTok';
          document.getElementById('title').textContent = 'איפוס סיסמה';
          document.getElementById('message').textContent = 'פתח את אפליקציית StockTok כדי להגדיר סיסמה חדשה.';
          document.getElementById('openAppBtn').textContent = 'פתח את StockTok';
          document.getElementById('footer').textContent = 'מטעמי אבטחה, הקישור פג תוקף לאחר שעה.';
        }

        var ua = navigator.userAgent || '';
        var isMobile = /iPhone|iPad|iPod|Android/i.test(ua);

        if (!isMobile) {
          // Desktop user — can't open the app at all.
          var msg = document.getElementById('message');
          msg.textContent = lang.indexOf('he') === 0
            ? 'פתח את המייל הזה בטלפון כדי לאפס את הסיסמה.'
            : 'This link is meant for the StockTok mobile app. Please open this email on your phone.';
          document.getElementById('openAppBtn').hidden = true;
          return;
        }

        if (!hash) {
          // Mobile but no recovery hash — link came from somewhere wrong.
          // Show the open-app button anyway as a courtesy.
          document.getElementById('openAppBtn').addEventListener('click', function () {
            window.location.href = 'stocktok://';
          });
          return;
        }

        // Try to open the app immediately. If it's installed and registered
        // for the stocktok:// scheme, the OS will switch to it silently.
        // If not, we stay on this page and after 1.5s reveal the store
        // buttons so the user can install it.
        function tryOpen() {
          window.location.href = deepLink;
        }

        document.getElementById('openAppBtn').addEventListener('click', tryOpen);

        // Auto-attempt on load (mobile only, with a recovery hash).
        setTimeout(tryOpen, 50);

        // Reveal store links if we're still here after 1.5s — strong signal
        // the app isn't installed (or the user dismissed the OS prompt).
        setTimeout(function () {
          document.getElementById('storeLinks').hidden = false;
        }, 1500);
      })();
    </script>
  </body>
</html>
